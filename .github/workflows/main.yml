name: Actualizacion Diaria Clima Pergamino

on:
  schedule:
    - cron: '0 11 * * *' # 11:00 UTC es 08:00 AM en Argentina
  workflow_dispatch:

# ESTO SOLUCIONA EL ERROR 128 DE PERMISOS
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install requests pandas

      - name: Ejecutar script de clima
        run: python actualizar_clima.py

      - name: Subir cambios al repo
        run: |
          # Usamos el bot oficial de GitHub Actions
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add pergamino_pronostico.csv
          
          # ESTO EVITA EL ERROR 128 CUANDO NO HAY CAMBIOS EN EL CLIMA
          if git diff --staged --quiet; then
            echo "No hay datos nuevos para actualizar hoy. Saltando commit."
          else
            git commit -m "Actualización automática clima Pergamino"
            git push
          fi
